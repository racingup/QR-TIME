    # ── qrtime / time.alpicapture.com ────────────────────────────────────
    # Add this server block INSIDE the http {} block of
    # /opt/appflowy/nginx/nginx.conf, AFTER the existing AppFlowy server block.
    #
    # Prerequisites:
    #   1. DNS A record: time.alpicapture.com → VPS IP
    #   2. certbot certonly --standalone -d time.alpicapture.com (stop nginx first)
    #      OR certbot certonly --webroot -w /var/www/html -d time.alpicapture.com
    #   3. docker network create shared_proxy
    #   4. Connect appflowy nginx to shared_proxy:
    #      Add to appflowy docker-compose.yml nginx service:
    #        networks:
    #          - default
    #          - shared_proxy
    #      And at the bottom:
    #        networks:
    #          shared_proxy:
    #            external: true

    server {
        listen 80;
        server_name time.alpicapture.com;
        # Redirect HTTP → HTTPS
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name time.alpicapture.com;

        ssl_certificate     /etc/letsencrypt/live/time.alpicapture.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/time.alpicapture.com/privkey.pem;

        client_max_body_size 10M;

        # Resolve qrtime container names via Docker DNS
        resolver 127.0.0.11 valid=10s;
        set $qrtime_backend  "http://qrtime-backend-1:8000";
        set $qrtime_frontend "http://qrtime-frontend-1:80";

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "same-origin" always;

        # API + Django admin + static → backend (gunicorn)
        location /api/ {
            proxy_pass $qrtime_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            proxy_pass $qrtime_backend;
            proxy_set_header Host $host;
        }

        # Django admin — path is set via DJANGO_ADMIN_PATH env var.
        # Replace "your-secret-admin-path/" with what you generate.
        location /your-secret-admin-path/ {
            proxy_pass $qrtime_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else → React SPA (nginx inside frontend container)
        location / {
            proxy_pass $qrtime_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
