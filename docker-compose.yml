services:
  db:
    image: postgres:16-alpine
    container_name: timbreuse_db
    environment:
      POSTGRES_DB: timbreuse
      POSTGRES_USER: timbreuse
      POSTGRES_PASSWORD: timbreuse
    ports:
      - "5432:5432"
    volumes:
      - timbreuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timbreuse -d timbreuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: timbreuse_redis
    ports:
      - "6379:6379"
    volumes:
      - timbreuse_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: timbreuse_backend
    environment:
      DJANGO_SECRET_KEY: docker-dev-key-change-in-prod
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://timbreuse:timbreuse@db:5432/timbreuse
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8000"
      # Routing : forwardé depuis le shell (`export ORS_API_KEY=…`).
      ORS_API_KEY: ${ORS_API_KEY:-}
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: ./backend
    container_name: timbreuse_celery
    environment:
      DJANGO_SECRET_KEY: docker-dev-key-change-in-prod
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://timbreuse:timbreuse@db:5432/timbreuse
      REDIS_URL: redis://redis:6379/0
      SKIP_SEED: "1"
    depends_on:
      backend:
        condition: service_started
    command: ["celery", "-A", "core", "worker", "-l", "info"]

  frontend:
    build: ./frontend
    container_name: timbreuse_frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  timbreuse_pgdata:
  timbreuse_redisdata:
