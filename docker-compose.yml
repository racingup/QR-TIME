services:
  db:
    image: postgres:16-alpine
    container_name: timbreuse_db
    environment:
      POSTGRES_DB: timbreuse
      POSTGRES_USER: timbreuse
      POSTGRES_PASSWORD: timbreuse
    ports:
      - "5432:5432"
    volumes:
      - timbreuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timbreuse -d timbreuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: timbreuse_redis
    ports:
      - "6379:6379"
    volumes:
      - timbreuse_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  timbreuse_pgdata:
  timbreuse_redisdata:
